<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="page-title">Perfect Wedding Photography Tips — Vita Hushel</title>
  <meta name="description" content="5 essential tips for perfect wedding photography. Learn how to capture magical moments that couples will treasure forever.">
  <link rel="canonical" href="https://vitahushelphoto.github.io/blog/post-1.html">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Montserrat', sans-serif; background-color: #f9f9f9; color: #222; margin: 0; padding: 0; line-height: 1.6; }
    nav { background-color: #111; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    nav a { color: #eee; text-decoration: none; font-weight: 600; transition: color 0.3s ease; font-size: 1.1rem; }
    nav a:hover { color: #c0c0c0; }
    .nav-left { display: flex; align-items: center; gap: 1rem; }
    .post-navigation { display: flex; justify-content: space-between; margin-top: 3rem; padding: 2rem 0; border-top: 1px solid #ddd; }
    .post-nav-btn { display: inline-block; padding: 0.5rem 1rem; background-color: #f5f5f5; color: #333; text-decoration: none; border-radius: 6px; transition: background-color 0.3s ease; font-weight: 500; }
    .post-nav-btn:hover { background-color: #e5e5e5; }
    .post-nav-btn.disabled { color: #999; pointer-events: none; background-color: #f9f9f9; }
    .lang-selector { display: flex; gap: 0.5rem; }
    .lang-btn { background: none; border: 1px solid #555; color: #eee; padding: 0.25rem 0.5rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; transition: all 0.3s ease; }
    .lang-btn:hover, .lang-btn.active { background-color: #555; border-color: #777; }
    main { max-width: 800px; margin: 2rem auto 4rem; padding: 2rem; background: white; box-shadow: 0 4px 12px rgb(0 0 0 / 0.1); border-radius: 8px; }
    h1 { font-size: 2.5rem; margin-bottom: 0.25rem; color: #222; }
    .date { color: #777; font-style: italic; margin-bottom: 2rem; }
    img { width: 100%; height: auto; border-radius: 8px; margin: 1.5rem 0; box-shadow: 0 2px 8px rgb(0 0 0 / 0.1); }
    h2 { margin-top: 2rem; font-size: 1.75rem; color: #333; border-bottom: 2px solid #ddd; padding-bottom: 0.5rem; }
    p { margin-bottom: 1.25rem; font-size: 1.1rem; color: #444; }
    footer { text-align: center; padding: 2rem 1rem; color: #999; font-size: 0.9rem; border-top: 1px solid #ddd; background: #fafafa; }
    @media (max-width: 600px) { h1 { font-size: 2rem; } main { margin: 1rem; padding: 1rem; } }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="/" id="home-link">Home</a>
      <a href="/blog" id="back-to-blog">← Back to Blog</a>
    </div>
    <div class="lang-selector">
      <button class="lang-btn" onclick="changeLanguage('en')" id="lang-en">EN</button>
      <button class="lang-btn" onclick="changeLanguage('uk')" id="lang-uk">UA</button>
      <button class="lang-btn" onclick="changeLanguage('pl')" id="lang-pl">PL</button>
    </div>
  </nav>

  <main>
    <h1 id="article-title">Perfect Wedding Photography Tips</h1>
    <p class="date" id="article-date">Date: July 28, 2025</p>
    <div id="article-content"></div>
    <div class="post-navigation">
      <a href="#" class="post-nav-btn disabled" id="prev-post">← Previous Post</a>
      <a href="/blog/post-2.html" class="post-nav-btn" id="next-post">Next Post →</a>
    </div>
  </main>

  <footer><p id="footer-text">© 2025 Vita Hushel</p></footer>

  <script>
    const translations = {
      en: {
        title: "Perfect Wedding Photography Tips — Vita Hushel",
        homeLink: "Home", backToBlog: "← Back to Blog",
        articleTitle: "Perfect Wedding Photography Tips", articleDate: "Date: July 28, 2025",
        nextPost: "Next Post →", prevPost: "",
        content: {
          intro: "Wedding photography is one of the most important and challenging genres of photography. In this article, we'll explore essential tips to help you capture the perfect moments on one of the most important days in a couple's life.",
          preparation: "Preparation is Key",
          preparationText: "Before the wedding day, meet with the couple to discuss their vision, preferred style, and must-have shots. Scout the venue if possible to identify the best lighting spots and potential photo locations.",
          equipment: "Equipment Essentials",
          equipmentText: "Always bring backup equipment - cameras, lenses, batteries, and memory cards. A 24-70mm and 70-200mm lens combination works well for most wedding scenarios. Don't forget external flashes for low-light situations.",
          emotions: "Capturing Emotions",
          emotionsText: "Focus on candid moments and genuine emotions. Some of the best wedding photos happen between the formal shots - laughter during preparation, tears during vows, and joy during the celebration.",
          conclusion: "Remember, you're not just a photographer on a wedding day - you're a guardian of memories that will last a lifetime."
        },
        footerText: "© 2025 Vita Hushel"
      },
      uk: {
        title: "Поради для ідеального весільного фото — Віта Гушель",
        homeLink: "Головна", backToBlog: "← Назад до блогу",
        articleTitle: "Поради для ідеального весільного фото", articleDate: "Дата: 28 липня 2025",
        nextPost: "Наступна стаття →", prevPost: "",
        content: {
          intro: "Весільна фотографія — один з найважливіших і найскладніших жанрів фотографії. У цій статті ми розглянемо основні поради, які допоможуть вам зафіксувати ідеальні моменти в один з найважливіших днів у житті пари.",
          preparation: "Підготовка — основа успіху",
          preparationText: "Перед весільним днем зустріньтеся з парою, щоб обговорити їхнє бачення, бажаний стиль та обов'язкові кадри. По можливості відвідайте місце проведення.",
          equipment: "Необхідне обладнання",
          equipmentText: "Завжди беріть запасне обладнання — камери, об'єктиви, батареї та карти пам'яті. Комбінація об'єктивів 24-70мм та 70-200мм добре підходить для більшості весільних сценаріїв.",
          emotions: "Фіксація емоцій",
          emotionsText: "Зосередьтеся на природних моментах та справжніх емоціях. Деякі з найкращих весільних фотографій відбуваються між офіційними кадрами.",
          conclusion: "Пам'ятайте, що в день весілля ви не просто фотограф — ви охоронець спогадів, які залишаться на все життя."
        },
        footerText: "© 2025 Віта Гушель"
      },
      pl: {
        title: "Wskazówki do idealnej fotografii ślubnej — Vita Hushel",
        homeLink: "Strona główna", backToBlog: "← Powrót do bloga",
        articleTitle: "Wskazówki do idealnej fotografii ślubnej", articleDate: "Data: 28 lipca 2025",
        nextPost: "Następny artykuł →", prevPost: "",
        content: {
          intro: "Fotografia ślubna to jeden z najważniejszych i najtrudniejszych gatunków fotografii. W tym artykule omówimy podstawowe wskazówki.",
          preparation: "Przygotowanie to podstawa",
          preparationText: "Przed dniem ślubu spotkaj się z parą, aby omówić ich wizję, preferowany styl i niezbędne ujęcia.",
          equipment: "Niezbędny sprzęt",
          equipmentText: "Zawsze zabieraj zapasowy sprzęt - aparaty, obiektywy, baterie i karty pamięci.",
          emotions: "Uchwycenie emocji",
          emotionsText: "Skup się na naturalnych momentach i prawdziwych emocjach.",
          conclusion: "Pamiętaj, że w dniu ślubu nie jesteś tylko fotografem - jesteś strażnikiem wspomnień."
        },
        footerText: "© 2025 Vita Hushel"
      }
    };

    function getLanguageFromURL() {
      const urlParams = new URLSearchParams(window.location.search);
      const lang = urlParams.get('lang');
      if (lang && translations[lang]) return lang;
      const browserLang = navigator.language.split('-')[0];
      return translations[browserLang] ? browserLang : 'en';
    }

    function changeLanguage(lang) {
      const url = new URL(window.location);
      url.searchParams.set('lang', lang);
      window.history.replaceState({}, '', url);
      updateContent(lang);
      updateActiveLanguageButton(lang);
    }

    function updateActiveLanguageButton(lang) {
      document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
      const btn = document.getElementById('lang-' + lang);
      if (btn) btn.classList.add('active');
    }

    function updateContent(lang) {
      const t = translations[lang];
      document.documentElement.lang = lang;
      document.getElementById('page-title').textContent = t.title;
      document.title = t.title;
      document.getElementById('home-link').textContent = t.homeLink;
      document.getElementById('back-to-blog').textContent = t.backToBlog;
      document.getElementById('article-title').textContent = t.articleTitle;
      document.getElementById('article-date').textContent = t.articleDate;
      document.getElementById('footer-text').textContent = t.footerText;
      const nextBtn = document.getElementById('next-post');
      if (nextBtn) nextBtn.textContent = t.nextPost;
      const content = document.getElementById('article-content');
      content.innerHTML = `
        <p>${t.content.intro}</p>
        <h2>${t.content.preparation}</h2>
        <p>${t.content.preparationText}</p>
        <h2>${t.content.equipment}</h2>
        <p>${t.content.equipmentText}</p>
        <img src="/assets/blog/wedding-tips.jpg" alt="Wedding photography" loading="lazy" width="800" height="450">
        <h2>${t.content.emotions}</h2>
        <p>${t.content.emotionsText}</p>
        <p>${t.content.conclusion}</p>
      `;
    }

    const currentLang = getLanguageFromURL();
    updateContent(currentLang);
    updateActiveLanguageButton(currentLang);
  </script>
</body>
</html>
